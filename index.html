<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pikachu UI</title>
    <meta name="description" content="This is the basic Pikachu card" />
    <link
      rel="shortcut icon"
      href="./Images/pikachu favicon.jpg"
      type="image/x-icon"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/remixicon@4.9.1/fonts/remixicon.min.css"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <div class="left">
        <img
          src="./Images/pokemon-logo-png-0.png"
          alt="Pokemon logo here"
          class="logo"
        />
        <h6>Pokemon Gen I</h6>
        <h1>Pikachu</h1>
        <p class="description">
          Pikachu is an Electric-type Pokemon introduced <br />in Generation I.
          Pikachu are small, chubby, <br />
          incredibly cute mouse-like Pokemon. <br />They are almost completely
          covered by <br />yellow fur.
        </p>
        <p class="count">----- 01 / 06</p>
      </div>
      <div class="right">
        <i class="ri-menu-line"></i>
        <div class="circlebox">
          <div class="circle" style="background-color: black"></div>
          <div class="circle"></div>
          <div class="circle"></div>
          <div class="circle"></div>
          <div class="circle"></div>
        </div>
      </div>
      <img
        class="pikachu"
        src="./Images/pikachu-transparent-hd-1.png"
        alt="Pikachu image not found"
      />
    </div>
  </body>
</html>
